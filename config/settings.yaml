model:
  n_factors: 4
  n_regimes: 2
  regime_labels:
    - expansion
    - recession
  factor_names:
    - real_activity
    - labor_market
    - inflation
    - financial_stress
  em_max_iter: 200
  em_tol: 1.0e-6
  kalman:
    initial_state_mean: 0.0
    initial_state_cov: 1.0

  # Ensemble recession detection
  ensemble:
    enabled: true
    weights:
      rsm: 0.25        # Multivariate Markov-switching model
      probit: 0.50      # Probit model (supervised, highest weight)
      cfnai: 0.25       # CFNAI threshold signal
    probit:
      add_lags: 1
      regularization: 0.01
      extra_features:
        - CFNAI
        - T10Y2Y

allocation:
  regime_conditional_weights:
    expansion:
      equities: 0.60
      bonds: 0.20
      commodities: 0.15
      cash: 0.05
    recession:
      equities: 0.15
      bonds: 0.50
      commodities: 0.05
      cash: 0.30

data:
  fred_api_base_url: "https://api.stlouisfed.org/fred"
  cache_dir: "data/cache"
  database_path: "data/nowcaster.duckdb"
  start_date: "1980-01-01"
  vintage_dir: "data/vintages"

agent:
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_tokens: 1500
  system_prompt_path: "config/prompts/macro_analyst_system.txt"

dashboard:
  title: "Macro Regime Nowcaster"
  refresh_interval: 3600
  chart_theme: "plotly_dark"
  recession_shading: true
